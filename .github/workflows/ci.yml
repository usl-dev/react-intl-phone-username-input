name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build library
        run: npm run build

      - name: Check dist output
        run: |
          test -f dist/index.esm.js || (echo "ESM build missing" && exit 1)
          test -f dist/index.cjs    || (echo "CJS build missing" && exit 1)
          test -f dist/react-intl-phone-username-input.css || (echo "CSS build missing" && exit 1)
          echo "All dist artifacts present."
